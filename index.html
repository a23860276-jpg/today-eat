<!DOCTYPE html>
<html lang="zh-Hant">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1, viewport-fit=cover">
<meta name="theme-color" content="#ff6b35">
<meta name="apple-mobile-web-app-capable" content="yes">
<meta name="apple-mobile-web-app-status-bar-style" content="default">
<meta name="apple-mobile-web-app-title" content="今天吃什麼">
<title>今天吃什麼？</title>
<link rel="icon" href="data:image/svg+xml,<svg xmlns=%22http://www.w3.org/2000/svg%22 viewBox=%220 0 100 100%22><text y=%22.9em%22 font-size=%2290%22>🍽️</text></svg>">
<style>
  :root{
    --bg:#f6f5f3; --card:#ffffff; --text:#1f2328; --muted:#7a828c; --line:#e7e3dd;
    --accent:#ff6b35; --accent-d:#e8590c;
    --inc:#2f9e44; --inc-bg:#e9f9ee; --inc-bd:#a3e3b6;
    --exc:#e03131; --exc-bg:#fdecec; --exc-bd:#f4b9b9;
    --chip:#f0eee9; --chip-bd:#e2ddd4; --chip-tx:#444b53;
    --shadow:0 6px 24px rgba(0,0,0,.10);
    --tab-h:60px; --safe-b:env(safe-area-inset-bottom,0px);
  }
  @media (prefers-color-scheme: dark){
    :root{
      --bg:#16181c; --card:#202329; --text:#eceef1; --muted:#9aa2ab; --line:#2c3037;
      --chip:#2a2e35; --chip-bd:#3a3f47; --chip-tx:#cbd1d8;
      --inc-bg:#16321f; --inc-bd:#2f6b41; --exc-bg:#3a1b1b; --exc-bd:#7a3636;
      --shadow:0 6px 24px rgba(0,0,0,.45);
    }
  }
  *{box-sizing:border-box; -webkit-tap-highlight-color:transparent;}
  html,body{margin:0; padding:0;}
  body{
    font-family:-apple-system,BlinkMacSystemFont,"PingFang TC","Noto Sans TC","Microsoft JhengHei",sans-serif;
    background:var(--bg); color:var(--text); font-size:16px; line-height:1.5;
    padding-bottom:calc(var(--tab-h) + var(--safe-b));
    max-width:640px; margin:0 auto; min-height:100vh;
  }
  header.app{
    position:sticky; top:0; z-index:20; background:var(--bg);
    padding:14px 16px 8px; display:flex; align-items:center; gap:8px;
    border-bottom:1px solid var(--line);
  }
  header.app h1{font-size:19px; margin:0; font-weight:800; letter-spacing:.5px;}
  header.app .sub{font-size:12px; color:var(--muted); margin-left:auto;}
  .view{display:none; padding:14px 16px 24px;}
  .view.active{display:block;}
  body.tab-home{padding-bottom:calc(var(--tab-h) + var(--safe-b) + 84px);}

  /* tabbar */
  nav.tabbar{
    position:fixed; left:0; right:0; bottom:0; z-index:30;
    height:calc(var(--tab-h) + var(--safe-b)); padding-bottom:var(--safe-b);
    background:var(--card); border-top:1px solid var(--line);
    display:flex; max-width:640px; margin:0 auto;
  }
  nav.tabbar button{
    flex:1; border:none; background:none; color:var(--muted);
    font-size:12px; display:flex; flex-direction:column; align-items:center; justify-content:center; gap:3px;
    cursor:pointer; font-family:inherit;
  }
  nav.tabbar button .ic{font-size:21px; line-height:1;}
  nav.tabbar button.active{color:var(--accent); font-weight:700;}

  /* decide bar */
  .decide-bar{
    display:none; position:fixed; left:0; right:0; bottom:calc(var(--tab-h) + var(--safe-b));
    max-width:640px; margin:0 auto; z-index:25;
    padding:10px 16px 12px; background:linear-gradient(to top, var(--bg) 70%, transparent);
    align-items:center; gap:12px;
  }
  body.tab-home .decide-bar{display:flex;}
  .count{font-size:14px; color:var(--muted); white-space:nowrap;}
  .count b{color:var(--text); font-size:17px;}
  .count.zero b{color:var(--exc);}
  .decide{
    flex:1; border:none; border-radius:16px; cursor:pointer; font-family:inherit;
    background:var(--accent); color:#fff; font-size:21px; font-weight:800; padding:16px;
    box-shadow:0 6px 18px rgba(255,107,53,.4); letter-spacing:1px;
  }
  .decide:active{transform:translateY(1px); background:var(--accent-d);}

  /* hint + groups */
  .hint{font-size:13px; color:var(--muted); background:var(--card); border:1px solid var(--line);
    border-radius:12px; padding:9px 12px; margin-bottom:14px;}
  .hint .t-inc{color:var(--inc);} .hint .t-exc{color:var(--exc);}
  .toprow{display:flex; align-items:center; margin-bottom:10px;}
  .linkbtn{background:none; border:none; color:var(--accent); font-size:14px; cursor:pointer; font-family:inherit; padding:4px; font-weight:600;}
  .fgroup{margin-bottom:14px;}
  .fglabel{font-size:13px; font-weight:700; color:var(--muted); margin-bottom:7px;}
  .fglabel .muted{font-weight:400;}
  .chips{display:flex; flex-wrap:wrap; gap:8px;}
  .chip{
    border:1.5px solid var(--chip-bd); background:var(--chip); color:var(--chip-tx);
    border-radius:999px; padding:9px 14px; font-size:15px; cursor:pointer; font-family:inherit;
    transition:transform .04s;
  }
  .chip:active{transform:scale(.96);}
  .chip.inc{background:var(--inc-bg); border-color:var(--inc-bd); color:var(--inc); font-weight:700;}
  .chip.inrange{background:var(--inc-bg); border-color:var(--inc-bd); color:var(--inc);}
  .chip.exc{background:var(--exc-bg); border-color:var(--exc-bd); color:var(--exc); font-weight:700; text-decoration:line-through;}
  .chip.sel{background:var(--accent); border-color:var(--accent); color:#fff; font-weight:700;}
  .chip.add{border-style:dashed; color:var(--muted);}

  .switchrow{display:flex; align-items:center; gap:10px; background:var(--card); border:1px solid var(--line);
    border-radius:12px; padding:12px 14px; margin-top:6px;}
  .switchrow span{flex:1; font-size:15px;}
  input[type=checkbox]{width:22px; height:22px; accent-color:var(--accent); cursor:pointer;}

  /* store list */
  .listhead{display:flex; gap:10px; margin-bottom:12px;}
  .search{flex:1; border:1px solid var(--line); background:var(--card); color:var(--text);
    border-radius:12px; padding:11px 14px; font-size:15px; font-family:inherit;}
  .btn{border:none; border-radius:12px; cursor:pointer; font-family:inherit; font-size:15px; font-weight:600; padding:11px 16px;}
  .btn.primary{background:var(--accent); color:#fff;}
  .btn.ghost{background:var(--card); color:var(--text); border:1px solid var(--line);}
  .btn.danger{background:var(--exc-bg); color:var(--exc); border:1px solid var(--exc-bd);}
  .btn.block{display:block; width:100%; margin-top:10px; padding:14px;}
  .btn.veto{background:var(--exc-bg); color:var(--exc); border:1px solid var(--exc-bd);}
  .btn:disabled{opacity:.42; cursor:default;}
  .btn:disabled:active{transform:none;}
  .btn:active{transform:translateY(1px);}
  .nameinput{width:150px; flex:0 0 auto; border:1px solid var(--line); background:var(--bg); color:var(--text); border-radius:10px; padding:9px 12px; font-size:16px; font-family:inherit;}
  .votes{margin-top:10px; display:flex; flex-direction:column; gap:6px;}
  .voterow{display:flex; align-items:center; gap:6px;}
  .voterow .vn{font-size:13px; color:var(--muted); flex:0 0 auto; min-width:40px; max-width:72px; overflow:hidden; text-overflow:ellipsis; white-space:nowrap;}
  .vb{flex:1; border:1px solid var(--chip-bd); background:var(--chip); color:var(--chip-tx); border-radius:8px; padding:7px 4px; font-size:13px; cursor:pointer; font-family:inherit;}
  .vb:active{transform:scale(.96);}
  .vb.on.like{background:var(--inc-bg); border-color:var(--inc-bd); color:var(--inc); font-weight:700;}
  .vb.on.ok{background:#fff3df; border-color:#e6c178; color:#b56a08; font-weight:700;}
  .vb.on.no{background:var(--exc-bg); border-color:var(--exc-bd); color:var(--exc); font-weight:700;}

  .scard{background:var(--card); border:1px solid var(--line); border-radius:14px; padding:13px 15px; margin-bottom:10px; cursor:pointer;}
  .scard:active{background:var(--bg);}
  .scard .nm{font-size:17px; font-weight:700; display:flex; align-items:center; gap:8px;}
  .scard .meta{font-size:13px; color:var(--muted); margin-top:3px;}
  .scard .tags{display:flex; flex-wrap:wrap; gap:6px; margin-top:8px;}
  .tag{font-size:12px; background:var(--chip); border:1px solid var(--chip-bd); color:var(--chip-tx); border-radius:999px; padding:3px 9px;}
  .empty{text-align:center; color:var(--muted); padding:40px 16px; font-size:15px; line-height:1.8;}
  .empty .big{font-size:40px; display:block; margin-bottom:8px;}

  /* settings */
  .sect{background:var(--card); border:1px solid var(--line); border-radius:14px; padding:6px 15px; margin-bottom:16px;}
  .sect h2{font-size:14px; color:var(--muted); margin:14px 0 6px; font-weight:700;}
  .row{display:flex; align-items:center; gap:10px; padding:11px 0; border-bottom:1px solid var(--line);}
  .row:last-child{border-bottom:none;}
  .row .lbl{flex:1; font-size:15px;}
  .row .lbl small{display:block; color:var(--muted); font-size:12px; font-weight:400;}
  .stepper{display:flex; align-items:center; gap:0; border:1px solid var(--line); border-radius:10px; overflow:hidden;}
  .stepper button{width:38px; height:38px; border:none; background:var(--bg); color:var(--text); font-size:20px; cursor:pointer; font-family:inherit;}
  .stepper b{min-width:34px; text-align:center; font-size:16px;}
  .statline{display:flex; align-items:center; gap:8px; padding:8px 0; font-size:15px; border-bottom:1px dashed var(--line);}
  .statline:last-child{border-bottom:none;}
  .statline .rank{width:24px; color:var(--muted); font-weight:700;}
  .statline .nm{flex:1;}
  .statline .ct{color:var(--accent); font-weight:700;}
  .statline .del{background:none; border:none; color:var(--muted); font-size:18px; cursor:pointer;}
  .ver{text-align:center; color:var(--muted); font-size:12px; margin-top:8px;}

  /* modal */
  .modal{position:fixed; inset:0; z-index:50; background:rgba(0,0,0,.45); display:none; align-items:flex-end; justify-content:center;}
  .modal.show{display:flex;}
  @media(min-width:600px){ .modal{align-items:center;} }
  .sheet{background:var(--card); width:100%; max-width:640px; max-height:92vh; overflow:auto;
    border-radius:20px 20px 0 0; padding:18px 18px calc(20px + var(--safe-b)); box-shadow:var(--shadow);}
  @media(min-width:600px){ .sheet{border-radius:20px; max-height:88vh;} }
  .sheet h2.title{margin:2px 0 14px; font-size:18px;}
  .field{margin-bottom:14px;}
  .field label.flbl{display:block; font-size:13px; font-weight:700; color:var(--muted); margin-bottom:6px;}
  .field input.tin, .field textarea.tin{width:100%; border:1px solid var(--line); background:var(--bg); color:var(--text);
    border-radius:12px; padding:12px 14px; font-size:16px; font-family:inherit;}
  .field textarea.tin{min-height:70px; resize:vertical;}
  .formbtns{display:flex; gap:10px; margin-top:6px;}
  .formbtns .btn{flex:1; padding:14px;}

  /* result */
  .result-card{text-align:center; padding:8px 4px;}
  .relaxnote{font-size:13px; color:var(--exc); background:var(--exc-bg); border:1px solid var(--exc-bd);
    border-radius:10px; padding:8px 12px; margin-bottom:14px;}
  .r-eyebrow{font-size:14px; color:var(--muted); margin-bottom:6px;}
  #r-name{font-size:34px; font-weight:900; line-height:1.25; margin:6px 0 4px; word-break:break-word; color:var(--accent);}
  #r-name.spin{opacity:.85; filter:blur(.3px);}
  .r-info{margin:16px auto 4px; max-width:420px; text-align:left;}
  .r-info .ri{display:flex; gap:10px; padding:7px 0; border-bottom:1px dashed var(--line); font-size:15px;}
  .r-info .ri:last-child{border-bottom:none;}
  .r-info .ri .k{color:var(--muted); width:48px; flex-shrink:0;}
  .r-info .tags{display:flex; flex-wrap:wrap; gap:6px; margin-top:4px;}
  .toast{position:fixed; left:50%; bottom:calc(var(--tab-h) + 30px); transform:translateX(-50%);
    background:#222; color:#fff; padding:11px 18px; border-radius:999px; font-size:14px; z-index:80;
    opacity:0; transition:opacity .25s; pointer-events:none; max-width:90%;}
  .toast.show{opacity:.95;}
  @media (prefers-reduced-motion: reduce){ *{transition:none !important;} }
</style>
</head>
<body class="tab-home">

<header class="app">
  <h1>🍽️ 今天吃什麼？</h1>
  <span class="sub">由 App 幫你決定</span>
</header>

<!-- 決定 -->
<section id="view-home" class="view active">
  <div class="hint">點一下＝<b class="t-inc">要</b>，再點一下＝<b class="t-exc">不要</b>，再點＝不限。沒選的就不限制。</div>
  <div class="toprow"><div class="fglabel" style="margin:0">今天的條件</div><button class="linkbtn" id="clearFilters" style="margin-left:auto">清除條件</button></div>
  <div id="filters"></div>
  <label class="switchrow"><span>避開最近吃過的 🔁</span><input type="checkbox" id="avoidToggle"></label>
  <label class="switchrow"><span>排除有人「不喜歡」的店 🙅</span><input type="checkbox" id="dislikeToggle"></label>
</section>

<!-- 決定列（固定底部） -->
<div class="decide-bar">
  <div id="count" class="count"></div>
  <button id="decideBtn" class="decide">決定！</button>
</div>

<!-- 店家 -->
<section id="view-stores" class="view">
  <div class="listhead">
    <input type="search" id="storeSearch" class="search" placeholder="搜尋店名或標籤…">
    <button class="btn primary" id="addStoreBtn">＋ 新增</button>
  </div>
  <div id="storeList"></div>
</section>

<!-- 設定 -->
<section id="view-settings" class="view">
  <div id="settingsBody"></div>
</section>

<!-- 底部分頁 -->
<nav class="tabbar">
  <button data-tab="home" class="active"><span class="ic">🎯</span>決定</button>
  <button data-tab="stores"><span class="ic">🏪</span>店家</button>
  <button data-tab="settings"><span class="ic">⚙️</span>設定</button>
</nav>

<!-- 結果浮層 -->
<div class="modal" id="resultModal">
  <div class="sheet">
    <div id="resultBody"></div>
  </div>
</div>

<!-- 店家表單浮層 -->
<div class="modal" id="formModal">
  <div class="sheet">
    <h2 class="title" id="formTitle">新增店家</h2>
    <div class="field"><label class="flbl">店名（必填）</label><input class="tin" id="f-name" type="text" placeholder="例如：鼎泰豐"></div>
    <div id="formGroups"></div>
    <div class="field"><label class="flbl">地址／參考點（選填）</label><input class="tin" id="f-location" type="text" placeholder="例如：南屯老街 / 文心路 / 地址"></div>
    <div class="field"><label class="flbl">備註</label><textarea class="tin" id="f-note" placeholder="推薦菜色、營業時間…"></textarea></div>
    <div class="formbtns">
      <button class="btn ghost" id="formCancel">取消</button>
      <button class="btn primary" id="formSave">儲存</button>
    </div>
    <button class="btn danger block" id="formDelete" style="display:none">刪除這間店</button>
  </div>
</div>

<div class="toast" id="toast"></div>

<script>
"use strict";

/* ---------- 資料層 ---------- */
const KEY = "eat-what-data";
const CATS = [
  {key:"staple",  label:"主食", multi:true},
  {key:"cuisine", label:"菜系", multi:true},
  {key:"meals",   label:"餐別", multi:true},
  {key:"distance",label:"距離", multi:false},
  {key:"price",   label:"價位", multi:false},
];
const CAT_LABEL = Object.fromEntries(CATS.map(c=>[c.key,c.label]));
const DEFAULT_TAGS = {
  staple:["麵","飯","鍋物","麵食","其他"],
  cuisine:["中式","西式","日式","東南亞","韓式","其他"],
  meals:["早餐","午餐","晚餐","宵夜"],
  distance:["步行可到","車程5分鐘內","車程10分鐘內","車程15分鐘內","車程20分鐘內","車程20分鐘以上"],
  price:["100以內","100~200","200~300","300~500","500以上"],
};
const VOTE_LABEL = {like:"喜歡", ok:"普通", no:"不喜歡"};
function defaults(){
  return {version:1, stores:[], tagOptions:JSON.parse(JSON.stringify(DEFAULT_TAGS)),
    log:[], settings:{avoidRecent:true, avoidWindow:5, animation:true, openMaps:true, excludeDisliked:false, user1:"我", user2:"太太"}};
}
function uid(){ return (crypto.randomUUID && crypto.randomUUID()) || ("id-"+Date.now()+"-"+Math.random().toString(36).slice(2)); }
function clamp(n,a,b){ return Math.max(a, Math.min(b, n)); }

// 多值欄位可吃陣列或「、，,/」分隔字串
function toArr(v){
  if(Array.isArray(v)) return v.map(x=>String(x).trim()).filter(Boolean);
  if(v==null) return [];
  return String(v).split(/[、，,/／|・]+/).map(x=>x.trim()).filter(Boolean);
}
function toStr(v){ const x = Array.isArray(v) ? (v.length?v[0]:"") : (v==null?"":v); return String(x).trim(); }
function normStore(s){
  s = s || {};
  const pick=(...keys)=>{ for(const k of keys){ const val=s[k]; if(val!=null && val!=="") return val; } return undefined; };
  return {
    id: s.id || uid(),
    name: String(pick("name","餐廳","店名")||"").trim(),
    staple: toArr(pick("staple","主食")),
    cuisine: toArr(pick("cuisine","菜系")),
    meals: toArr(pick("meals","餐別")),
    distance: toStr(pick("distance","距離")),
    price: toStr(pick("price","價位")),
    location: String(pick("location","地址","地點")||""),
    note: String(pick("note","備註")||""),
    votes: Array.isArray(s.votes)? [s.votes[0]||"", s.votes[1]||""] : ["",""],
    createdAt: s.createdAt||Date.now(), updatedAt: s.updatedAt||Date.now(),
  };
}
function normalize(d){
  const out = defaults();
  if(!d || typeof d!=="object") return out;
  // tagOptions：保留使用者選項，並確保每個分類都存在
  for(const k of Object.keys(DEFAULT_TAGS)){
    const v = d.tagOptions && d.tagOptions[k];
    out.tagOptions[k] = Array.isArray(v) ? Array.from(new Set(v.map(String))) : DEFAULT_TAGS[k].slice();
  }
  out.stores = Array.isArray(d.stores) ? d.stores.map(normStore) : [];
  out.log = Array.isArray(d.log) ? d.log.filter(x=>x&&x.id).map(x=>({id:x.id, name:String(x.name||""), ts:x.ts||Date.now()})) : [];
  out.settings = Object.assign(out.settings, d.settings||{});
  out.settings.avoidRecent = !!out.settings.avoidRecent;
  out.settings.animation = !!out.settings.animation;
  out.settings.openMaps = out.settings.openMaps!==false;
  out.settings.excludeDisliked = !!out.settings.excludeDisliked;
  out.settings.user1 = String(out.settings.user1||"").trim().slice(0,12) || "我";
  out.settings.user2 = String(out.settings.user2||"").trim().slice(0,12) || "太太";
  out.settings.avoidWindow = clamp(parseInt(out.settings.avoidWindow)||5, 1, 20);
  return out;
}
function load(){
  try{ const raw = localStorage.getItem(KEY); return raw ? normalize(JSON.parse(raw)) : defaults(); }
  catch(e){ console.warn(e); return defaults(); }
}
function save(){
  try{ localStorage.setItem(KEY, JSON.stringify(state)); }
  catch(e){ alert("儲存失敗：瀏覽器可能在無痕模式或限制了本機儲存。請改用一般視窗，或用「匯出 JSON」備份。"); }
}
let state = load();

/* ---------- 小工具 ---------- */
const $ = (s,r=document)=>r.querySelector(s);
const $$ = (s,r=document)=>Array.from(r.querySelectorAll(s));
function esc(s){ return String(s).replace(/[&<>"']/g, c=>({"&":"&amp;","<":"&lt;",">":"&gt;",'"':"&quot;","'":"&#39;"}[c])); }
let toastTimer;
function toast(msg){
  const t=$("#toast"); t.textContent=msg; t.classList.add("show");
  clearTimeout(toastTimer); toastTimer=setTimeout(()=>t.classList.remove("show"), 1800);
}
function reducedMotion(){ try{ return matchMedia("(prefers-reduced-motion: reduce)").matches; }catch(e){ return false; } }
function dateStr(){ const d=new Date(); const p=n=>String(n).padStart(2,"0"); return d.getFullYear()+p(d.getMonth()+1)+p(d.getDate()); }

/* ---------- 篩選狀態（僅此次使用，不寫入儲存） ---------- */
let filters = {staple:{},cuisine:{},meals:{},distance:{},price:{}};
function autoMeal(){
  const h = new Date().getHours();
  const m = (h>=5&&h<11)?"早餐":(h>=11&&h<17)?"午餐":(h>=17&&h<22)?"晚餐":"宵夜";
  if(state.tagOptions.meals.includes(m)) filters.meals[m]=1;
}
function cycleFilter(cat, opt){
  const cur = filters[cat][opt];
  const next = cur===1 ? -1 : cur===-1 ? 0 : 1;
  if(next===0) delete filters[cat][opt]; else filters[cat][opt]=next;
}
function clearFilters(){ filters={staple:{},cuisine:{},meals:{},distance:{},price:{}}; }
// 距離為「最遠可接受」門檻（單選），選 20 分鐘內＝包含步行/5/10/15 分鐘內
function setDistanceThreshold(opt){ filters.distance = filters.distance[opt] ? {} : {[opt]:1}; }
function matchesFilters(store){
  for(const cat of CATS){
    if(cat.key==="distance"){
      const sel = Object.keys(filters.distance)[0];
      if(sel){
        const order = state.tagOptions.distance;
        const r = order.indexOf(store.distance);
        if(r<0 || r>order.indexOf(sel)) return false;
      }
      continue;
    }
    const fmap = filters[cat.key]; const inc=[], exc=[];
    for(const o in fmap){ if(fmap[o]===1) inc.push(o); else if(fmap[o]===-1) exc.push(o); }
    if(!inc.length && !exc.length) continue;
    const vals = cat.multi ? (store[cat.key]||[]) : (store[cat.key]? [store[cat.key]] : []);
    if(inc.length && !vals.some(v=>inc.includes(v))) return false;
    if(exc.length && vals.some(v=>exc.includes(v))) return false;
  }
  return true;
}

/* ---------- 分頁 ---------- */
let currentTab = "home";
function switchTab(tab){
  currentTab = tab;
  document.body.className = "tab-"+tab;
  $$(".view").forEach(v=>v.classList.remove("active"));
  $("#view-"+tab).classList.add("active");
  $$("nav.tabbar button").forEach(b=>b.classList.toggle("active", b.dataset.tab===tab));

  if(tab==="settings") renderSettings();

}

/* ---------- 主畫面：條件 ---------- */
function renderFilters(){
  let html="";
  for(const cat of CATS){
    const opts = state.tagOptions[cat.key]||[];
    if(cat.key==="customTags" && opts.length===0) continue;
    if(cat.key==="distance"){
      const sel = Object.keys(filters.distance)[0];
      const selIdx = sel ? opts.indexOf(sel) : -1;
      const dchips = opts.map((o,i)=>{
        const cls = selIdx<0 ? "chip" : (i===selIdx ? "chip inc" : (i<selIdx ? "chip inrange" : "chip"));
        const mark = (selIdx>=0 && i<=selIdx) ? "✓ " : "";
        return `<button class="${cls}" data-cat="distance" data-opt="${esc(o)}">${mark}${esc(o)}</button>`;
      }).join("");
      html += `<div class="fgroup"><div class="fglabel">距離 <span class="muted">（選最遠可接受，含更近的）</span></div><div class="chips">${dchips}</div></div>`;
      continue;
    }
    const chips = opts.map(o=>{
      const st = filters[cat.key][o];
      const cls = st===1?"chip inc":st===-1?"chip exc":"chip";
      const mark = st===1?"✓ ":st===-1?"✕ ":"";
      return `<button class="${cls}" data-cat="${cat.key}" data-opt="${esc(o)}">${mark}${esc(o)}</button>`;
    }).join("");
    html += `<div class="fgroup"><div class="fglabel">${cat.label}</div><div class="chips">${chips}</div></div>`;
  }
  $("#filters").innerHTML = html;
}
function currentCandidates(){
  let c = state.stores.filter(matchesFilters);
  if(state.settings.excludeDisliked) c = c.filter(s=> (s.votes||[]).indexOf("no")<0);
  return c;
}
function updateCount(){
  const n = currentCandidates().length;
  const el = $("#count");
  el.innerHTML = `目前符合 <b>${n}</b> 間`;
  el.classList.toggle("zero", n===0 && state.stores.length>0);
}
function renderHome(){

  $("#avoidToggle").checked = state.settings.avoidRecent;
  $("#dislikeToggle").checked = state.settings.excludeDisliked;
  updateCount();
}

/* ---------- 隨機抽選 ---------- */
let currentList=[], currentRelaxed=false, currentPick=null;
let vetoUsed={}, vetoedIds=[], vetoDisabled=[false,false]; // 兩人否決權：每輪每人各一次
function resetRound(){ vetoUsed={}; vetoedIds=[]; }
function userNames(){ return [ state.settings.user1||"我", state.settings.user2||"太太" ]; }
function applyAvoid(cands){
  if(!state.settings.avoidRecent) return {list:cands, relaxed:false};
  const recent = state.log.slice(0, state.settings.avoidWindow).map(x=>x.id);
  const filtered = cands.filter(s=>!recent.includes(s.id));
  if(filtered.length===0) return {list:cands, relaxed:true};
  return {list:filtered, relaxed:false};
}
function pickFrom(list, avoidIds){
  avoidIds = avoidIds || [];
  let pool = list.filter(s=>avoidIds.indexOf(s.id)<0);
  if(pool.length===0) pool = list;
  return pool[Math.floor(Math.random()*pool.length)];
}
function decide(){
  if(state.stores.length===0){ openResultEmpty("noStore"); return; }
  const cands = currentCandidates();
  if(cands.length===0){ openResultEmpty("noMatch"); return; }
  const {list, relaxed} = applyAvoid(cands);
  resetRound();
  openResult(list, relaxed);
}
function openResult(list, relaxed){
  currentList=list; currentRelaxed=relaxed;
  const pick = pickFrom(list, vetoedIds);
  currentPick = pick;
  const animate = state.settings.animation && !reducedMotion() && list.length>1;
  const u = userNames();
  // 否決後是否還有「不同的店」可以換
  const remaining = list.filter(s=> vetoedIds.indexOf(s.id)<0 && s.id!==pick.id).length;
  const noMore = remaining===0;
  vetoDisabled = [ !!vetoUsed[0] || noMore, !!vetoUsed[1] || noMore ];
  const vbtn = (i)=>{
    const used = !!vetoUsed[i];
    const label = used ? esc(u[i])+"（已換過）" : "🙅 "+esc(u[i])+" 不喜歡";
    return `<button class="btn veto" id="veto${i}" ${vetoDisabled[i]?"disabled":""}>${label}</button>`;
  };
  const noMoreNote = (noMore && (!vetoUsed[0] || !vetoUsed[1]))
    ? '<div class="relaxnote">沒有更多可以換的店了，就從這裡決定吧 🙂</div>' : '';
  $("#resultBody").innerHTML = `
    ${relaxed?'<div class="relaxnote">符合的店最近都吃過了，已暫時不避開最近紀錄 🙂</div>':''}
    ${noMoreNote}
    <div class="result-card">
      <div class="r-eyebrow">今天就吃…</div>
      <div id="r-name"${animate?' class="spin"':''}>${esc(pick.name)}</div>
      <div class="r-info" id="r-info"></div>
    </div>
    <div class="formbtns" style="margin-top:18px">
      ${vbtn(0)}
      ${vbtn(1)}
    </div>
    <button class="btn primary" id="acceptBtn" style="width:100%; margin-top:10px; padding:16px; font-size:18px">就吃這間！</button>
    <div style="display:flex; gap:18px; justify-content:center; margin-top:12px">
      <button class="linkbtn" id="mapBtn">🗺️ 看地圖</button>
      <button class="linkbtn" id="resultClose">關閉</button>
    </div>`;
  $("#veto0").onclick = ()=> vetoPick(0);
  $("#veto1").onclick = ()=> vetoPick(1);
  $("#acceptBtn").onclick = acceptPick;
  $("#mapBtn").onclick = ()=> openMaps(currentPick);
  $("#resultClose").onclick = closeResult;
  showModal("#resultModal");
  if(animate){
    setButtonsDisabled(true);
    runSlot(list.map(s=>s.name), pick.name, ()=>{
      $("#r-name").classList.remove("spin");
      renderResultInfo(pick); setButtonsDisabled(false);
    });
  } else {
    renderResultInfo(pick);
  }
}
function vetoPick(i){
  if(!currentPick || vetoUsed[i] || vetoDisabled[i]) return;
  vetoUsed[i] = true;
  if(vetoedIds.indexOf(currentPick.id)<0) vetoedIds.push(currentPick.id);
  const who = userNames()[i];
  openResult(currentList, currentRelaxed);
  toast(who+"不喜歡，換一間！");
}
function setButtonsDisabled(d){
  const acc=$("#acceptBtn"); if(acc) acc.disabled=d;
  const v0=$("#veto0"); if(v0) v0.disabled = d || vetoDisabled[0];
  const v1=$("#veto1"); if(v1) v1.disabled = d || vetoDisabled[1];
}
function runSlot(names, finalName, done){
  const el = $("#r-name");
  let delay=45, elapsed=0; const total=850;
  (function tick(){
    el.textContent = names[Math.floor(Math.random()*names.length)] || finalName;
    elapsed += delay;
    if(elapsed < total){ delay *= 1.14; setTimeout(tick, delay); }
    else { el.textContent = finalName; done && done(); }
  })();
}
function renderResultInfo(s){
  const rows=[];
  const add=(k,v)=>{ if(v) rows.push(`<div class="ri"><span class="k">${k}</span><span>${esc(v)}</span></div>`); };
  add("主食", (s.staple||[]).join("、")); add("菜系", (s.cuisine||[]).join("、"));
  add("餐別", (s.meals||[]).join("、")); add("距離", s.distance); add("價位", s.price);
  add("地點", s.location); add("備註", s.note);
  $("#r-info").innerHTML = rows.join("") || '<div class="ri"><span class="k">　</span><span class="k">（沒有其他資訊）</span></div>';
}
function mapsUrl(store){
  const q = [store.name, store.location, "台中"].filter(Boolean).join(" ");
  return "https://www.google.com/maps/dir/?api=1&destination=" + encodeURIComponent(q);
}
function openMaps(store){ if(store){ try{ window.open(mapsUrl(store), "_blank"); }catch(e){} } }
function acceptPick(){
  if(!currentPick) return;
  const pick = currentPick;
  state.log.unshift({id:pick.id, name:pick.name, ts:Date.now()});
  if(state.log.length>365) state.log.length=365;

function fmtDate(ts){ const d=new Date(ts); const p=n=>String(n).padStart(2,"0"); return (d.getMonth()+1)+"/"+d.getDate()+" "+p(d.getHours())+":"+p(d.getMinutes()); }

/* ---------- 匯出 / 匯入 / 清除 / 範例 ---------- */
function exportData(){
  const blob = new Blob([JSON.stringify(state,null,2)], {type:"application/json"});
  const url = URL.createObjectURL(blob);
  const a = document.createElement("a");
  a.href=url; a.download="今天吃什麼-備份-"+dateStr()+".json";
  document.body.appendChild(a); a.click(); a.remove();
  setTimeout(()=>URL.revokeObjectURL(url),1500);
  toast("已匯出備份");
}
function importData(file){
  const reader = new FileReader();
  reader.onload = ()=>{
    try{
      const data = JSON.parse(reader.result);
      if(!data || !Array.isArray(data.stores)) throw new Error("格式不符");
      if(!confirm("匯入會「覆蓋」目前所有資料，確定嗎？")) return;
      state = normalize(data); save();
      clearFilters(); autoMeal();
      renderHome(); renderStores(); renderSettings();
      toast("已匯入 "+state.stores.length+" 間店家");
    }catch(e){ alert("匯入失敗：這個檔案看起來不是有效的備份 JSON。"); }
  };
  reader.readAsText(file);
}
function importMerge(file){
  const reader = new FileReader();
  reader.onload = ()=>{
    try{
      const data = JSON.parse(reader.result);
      const incoming = Array.isArray(data) ? data : (Array.isArray(data.stores) ? data.stores : null);
      if(!incoming) throw new Error("格式不符");
      const existing = new Set(state.stores.map(s=>(s.name||"").trim()));
      let added=0, skipped=0;
      incoming.forEach(s=>{
        const st = normStore(s);
        if(!st.name){ return; }
        if(existing.has(st.name.trim())){ skipped++; return; }
        st.id = uid(); state.stores.push(st); existing.add(st.name.trim()); added++;
      });
      if(data.tagOptions){ for(const k of Object.keys(DEFAULT_TAGS)){ const v=data.tagOptions[k]; if(Array.isArray(v)) v.forEach(x=>{ if(state.tagOptions[k].indexOf(x)<0) state.tagOptions[k].push(x); }); } }
      save();
      clearFilters(); autoMeal();
      renderHome(); renderStores(); renderSettings();
      toast("合併完成：新增 "+added+" 間"+(skipped?("，略過重複 "+skipped+" 間"):""));
    }catch(e){ alert("合併匯入失敗：這個檔案看起來不是有效的清單 JSON。"); }
  };
  reader.readAsText(file);
}
function clearAll(){
  if(!confirm("確定要清除所有資料？此動作無法復原（建議先匯出備份）。")) return;

}

function loadSamples(){
  if(state.stores.length>0 && !confirm("會在現有店家後面加入 "+SAMPLE.length+" 間在地起始店家，確定嗎？")) return;
  SAMPLE.forEach(s=>{ const st=normStore(s); st.id=uid(); state.stores.push(st); });
  save();
  renderStores();
  toast("已加入 "+SAMPLE.length+" 間在地起始店家");
  switchTab("stores");
}

/* ---------- Modal 控制 ---------- */
function showModal(sel){ $(sel).classList.add("show"); }
function hideModal(sel){ $(sel).classList.remove("show"); }

/* ---------- 事件綁定 ---------- */
$$("nav.tabbar button").forEach(b=> b.onclick=()=>switchTab(b.dataset.tab));
$("#decideBtn").onclick = decide;
$("#clearFilters").onclick = ()=>{ clearFilters(); renderHome(); };
$("#avoidToggle").onchange = e=>{ state.settings.avoidRecent=e.target.checked; save(); };
$("#dislikeToggle").onchange = e=>{ state.settings.excludeDisliked=e.target.checked; save(); updateCount(); };
$("#filters").addEventListener("click", e=>{
  const b = e.target.closest(".chip"); if(!b) return;
  if(b.dataset.cat==="distance") setDistanceThreshold(b.dataset.opt);
  else cycleFilter(b.dataset.cat, b.dataset.opt);
  renderFilters(); updateCount();
});
$("#addStoreBtn").onclick = ()=> openForm(null);
$("#storeSearch").addEventListener("input", renderStores);
$("#storeList").addEventListener("click", e=>{
  const vb = e.target.closest(".vb");
  if(vb){ e.stopPropagation(); voteStore(vb.dataset.id, +vb.dataset.voter, vb.dataset.val); return; }
  const card = e.target.closest(".scard"); if(!card) return;
  const s = state.stores.find(x=>x.id===card.dataset.id); if(s) openForm(s);
});
function voteStore(id, voter, val){
  const s = state.stores.find(x=>x.id===id); if(!s) return;
  if(!Array.isArray(s.votes)) s.votes=["",""];
  s.votes[voter] = (s.votes[voter]===val) ? "" : val;
  save();
  renderStores();
}
$("#formGroups").addEventListener("click", e=>{
  const chip = e.target.closest("[data-fcat]");
  if(!chip) return;
  const cat = chip.dataset.fcat, opt = chip.dataset.opt;
  const meta = CATS.find(c=>c.key===cat);
  if(meta.multi){
    const arr = formStore[cat];
    const i = arr.indexOf(opt);
    if(i>=0) arr.splice(i,1); else arr.push(opt);
  } else {
    formStore[cat] = (formStore[cat]===opt) ? "" : opt;
  }
  renderFormGroups();
});
$("#f-name").addEventListener("input", e=>{ if(formStore) formStore.name=e.target.value; });
$("#formSave").onclick = saveForm;
$("#formCancel").onclick = ()=> hideModal("#formModal");
$("#formDelete").onclick = deleteStore;
// 點背景關閉浮層
$("#resultModal").addEventListener("click", e=>{ if(e.target.id==="resultModal") closeResult(); });
$("#formModal").addEventListener("click", e=>{ if(e.target.id==="formModal") hideModal("#formModal"); });

// 隱藏的匯入檔案輸入
const importInput = document.createElement("input");
importInput.type="file"; importInput.accept="application/json,.json"; importInput.id="importFile"; importInput.style.display="none";
importInput.addEventListener("change", e=>{ const f=e.target.files[0]; if(f) importData(f); e.target.value=""; });
document.body.appendChild(importInput);
const mergeInput = document.createElement("input");
mergeInput.type="file"; mergeInput.accept="application/json,.json"; mergeInput.id="mergeFile"; mergeInput.style.display="none";
mergeInput.addEventListener("change", e=>{ const f=e.target.files[0]; if(f) importMerge(f); e.target.value=""; });
document.body.appendChild(mergeInput);

// 首次開啟自動帶入在地起始店家（嶺東／南屯）；清空資料後就不會再自動帶入
if(localStorage.getItem(KEY)===null){
  SAMPLE.forEach(s=>{ const st=normStore(s); st.id=uid(); state.stores.push(st); });
  save();
}
autoMeal();
renderHome();
renderStores();
renderSettings();
