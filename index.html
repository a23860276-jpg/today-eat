    --glow:0 10px 28px rgba(255,90,48,.5);
  }
  *{box-sizing:border-box; -webkit-tap-highlight-color:transparent;}
  html,body{margin:0; padding:0;}
  body{
    font-family:-apple-system,BlinkMacSystemFont,"PingFang TC","Noto Sans TC","Microsoft JhengHei",sans-serif;
    color:var(--text); font-size:16px; line-height:1.5; -webkit-font-smoothing:antialiased;
    background:radial-gradient(130% 70% at 50% -12%, rgba(255,120,70,.10), transparent 58%), var(--bg);
    padding-bottom:calc(var(--tab-h) + var(--safe-b));
    max-width:640px; margin:0 auto; min-height:100vh;
  }
  ::selection{background:rgba(255,94,58,.22);}

  /* header */
  header.app{
    position:sticky; top:0; z-index:20; display:flex; align-items:center; gap:11px;
    padding:12px 16px; background:var(--glass); backdrop-filter:saturate(180%) blur(18px);
    -webkit-backdrop-filter:saturate(180%) blur(18px); border-bottom:1px solid var(--glass-bd);
  }
  header.app .logo{ width:38px; height:38px; border-radius:12px; background:var(--grad);
    display:flex; align-items:center; justify-content:center; font-size:20px; flex:0 0 auto;}
  header.app .brandtext{display:flex; flex-direction:column; line-height:1.18;}
  header.app h1{font-size:18px; margin:0; font-weight:800; letter-spacing:.2px;}
  header.app .sub{font-size:11.5px; color:var(--muted); margin:0;}

  .view{display:none; padding:16px 16px 26px; animation:viewin .3s ease;}
  .view.active{display:block;}
  @keyframes viewin{from{opacity:0; transform:translateY(6px)}to{opacity:1; transform:none}}
  body.tab-home{padding-bottom:calc(var(--tab-h) + var(--safe-b) + 94px);}

  /* tabbar */
  nav.tabbar{
    position:fixed; left:0; right:0; bottom:0; z-index:30;
    height:calc(var(--tab-h) + var(--safe-b)); padding-bottom:var(--safe-b);
    background:var(--glass); backdrop-filter:saturate(180%) blur(18px); -webkit-backdrop-filter:saturate(180%) blur(18px);
    border-top:1px solid var(--glass-bd); display:flex; max-width:640px; margin:0 auto;
  }
  nav.tabbar button{
    flex:1; border:none; background:none; color:var(--muted); position:relative;
    font-size:11px; font-weight:600; display:flex; flex-direction:column; align-items:center; justify-content:center; gap:3px;
    cursor:pointer; font-family:inherit; transition:color .2s;
  }
  nav.tabbar button .ic{font-size:22px; line-height:1; transition:transform .2s;}
  nav.tabbar button .ic svg{width:25px; height:25px; display:block;}
  header.app .logo svg{width:23px; height:23px; display:block;}
  .switchrow .tgl-ic{width:17px; height:17px; vertical-align:-3px; opacity:.8;}
  .bic{width:16px; height:16px; vertical-align:-3px;}
  .empty .big svg{width:46px; height:46px; display:block; margin:2px auto; opacity:.85;}
  nav.tabbar button.active{color:var(--brand); font-weight:700;}
  nav.tabbar button.active .ic{transform:translateY(-1px) scale(1.06);}
  nav.tabbar button.active::before{content:""; position:absolute; top:0; width:26px; height:3px; border-radius:0 0 3px 3px; background:var(--grad);}

  /* decide bar */
  .decide-bar{ display:none; position:fixed; left:0; right:0; bottom:calc(var(--tab-h) + var(--safe-b));
    max-width:640px; margin:0 auto; z-index:25; padding:12px 16px 14px; gap:12px; align-items:center;
    background:linear-gradient(to top, var(--bg) 60%, transparent);}
  body.tab-home .decide-bar{display:flex;}
  .count{font-size:13px; color:var(--muted); white-space:nowrap; font-weight:600;}
  .count b{color:var(--text); font-size:18px; font-weight:800;}
  .count.zero b{color:var(--exc);}
  .decide{ flex:1; border:none; border-radius:16px; cursor:pointer; font-family:inherit;
    background:var(--grad); color:#fff; font-size:20px; font-weight:800; padding:17px; letter-spacing:2px;
    box-shadow:0 4px 14px rgba(0,0,0,.14); transition:transform .12s, box-shadow .2s;}
  .decide:active{transform:scale(.975); box-shadow:0 4px 12px rgba(0,0,0,.2);}

  /* hint + groups */
  .hint{font-size:13px; color:var(--muted); background:var(--card); border:1px solid var(--line);
    border-radius:14px; padding:11px 13px; margin-bottom:16px; box-shadow:var(--sh-sm); line-height:1.6;}
  .hint .t-inc{color:var(--inc); font-weight:700;} .hint .t-exc{color:var(--exc); font-weight:700;}
  .toprow{display:flex; align-items:center; margin-bottom:12px;}
  .linkbtn{background:none; border:none; color:var(--brand); font-size:14px; cursor:pointer; font-family:inherit; padding:4px; font-weight:700;}
  .fgroup{margin-bottom:16px;}
  .fglabel{font-size:12px; font-weight:800; color:var(--muted); margin-bottom:9px; letter-spacing:.6px;}
  .fglabel .muted{font-weight:500; letter-spacing:0;}
  .chips{display:flex; flex-wrap:wrap; gap:8px;}
  /* 抽選頁標籤：固定一行、平均填滿、字體隨寬度縮放（窄手機也不換行）*/
  #filters .chips{ flex-wrap:nowrap; gap:5px; }
  #filters .chip{ flex:1 1 0; min-width:0; padding:9px 5px; text-align:center; white-space:nowrap; font-size:clamp(12px,3.5vw,15px); }
  .chip{ border:1.5px solid var(--chip-bd); background:var(--chip); color:var(--chip-tx);
    border-radius:999px; padding:9px 15px; font-size:15px; font-weight:600; cursor:pointer; font-family:inherit;
    transition:transform .12s, background .15s, color .15s, border-color .15s;}
  .chip:active{transform:scale(.94);}
  .chip.inc{background:var(--inc-bg); border-color:var(--inc-bd); color:var(--inc); font-weight:700;}
  .chip.inrange{background:var(--inc-bg); border-color:var(--inc-bd); color:var(--inc);}
  .chip.exc{background:var(--exc-bg); border-color:var(--exc-bd); color:var(--exc); font-weight:700; text-decoration:line-through;}
  .chip.sel{background:var(--grad); border-color:transparent; color:#fff; font-weight:700; box-shadow:0 4px 12px rgba(255,86,48,.32);}
  .chip.add{border-style:dashed; color:var(--muted); background:transparent;}

  .switchrow{display:flex; align-items:center; gap:12px; background:var(--card); border:1px solid var(--line);
    border-radius:14px; padding:13px 15px; margin-top:10px; box-shadow:var(--sh-sm);}
  .switchrow span{flex:1; font-size:15px; font-weight:500;}

  /* iOS-style toggle */
  input[type=checkbox]{ appearance:none; -webkit-appearance:none; flex:0 0 auto;
    width:48px; height:29px; border-radius:999px; background:var(--chip-bd); position:relative;
    cursor:pointer; transition:background .22s;}
  input[type=checkbox]::after{ content:""; position:absolute; top:3px; left:3px; width:23px; height:23px;
    border-radius:50%; background:#fff; box-shadow:0 2px 5px rgba(0,0,0,.28); transition:transform .22s;}
  input[type=checkbox]:checked{ background:var(--grad);}
  input[type=checkbox]:checked::after{ transform:translateX(19px);}

  /* store list */
  .listhead{display:flex; gap:10px; margin-bottom:14px;}
  .search{flex:1; border:1px solid var(--line); background:var(--card); color:var(--text);
    border-radius:13px; padding:12px 15px; font-size:15px; font-family:inherit; box-shadow:var(--sh-sm); transition:border-color .2s, box-shadow .2s;}
  .search:focus{outline:none; border-color:var(--brand); box-shadow:0 0 0 3px rgba(255,94,58,.16);}
  .btn{border:none; border-radius:var(--r-btn); cursor:pointer; font-family:inherit; font-size:15px; font-weight:700; padding:12px 17px; transition:transform .12s, filter .15s, box-shadow .2s;}
  .btn.primary{background:var(--grad); color:#fff; box-shadow:0 6px 16px rgba(255,86,48,.32);}
  .btn.ghost{background:var(--card); color:var(--text); border:1px solid var(--line); box-shadow:var(--sh-sm);}
  .btn.danger{background:var(--exc-bg); color:var(--exc); border:1px solid var(--exc-bd);}
  .btn.block{display:block; width:100%; margin-top:12px; padding:14px;}
  .btn.veto{background:var(--exc-bg); color:var(--exc); border:1px solid var(--exc-bd);}
  .btn:disabled{opacity:.4; cursor:default; box-shadow:none;}
  .btn:disabled:active{transform:none;}
  .btn:active{transform:scale(.97);}
  .nameinput{width:148px; flex:0 0 auto; border:1px solid var(--line); background:var(--bg); color:var(--text); border-radius:11px; padding:9px 12px; font-size:16px; font-family:inherit;}
  .nameinput:focus{outline:none; border-color:var(--brand); box-shadow:0 0 0 3px rgba(255,94,58,.16);}

  .votes{margin-top:12px; display:flex; flex-direction:column; gap:7px;}
  .voterow{display:flex; align-items:center; gap:7px;}
  .voterow .vn{font-size:13px; font-weight:600; color:var(--muted); flex:0 0 auto; min-width:40px; max-width:74px; overflow:hidden; text-overflow:ellipsis; white-space:nowrap;}
  .vb{flex:1; border:1.5px solid var(--chip-bd); background:var(--chip); color:var(--chip-tx); border-radius:10px; padding:8px 4px; font-size:13px; font-weight:600; cursor:pointer; font-family:inherit; transition:transform .12s, background .15s, color .15s, border-color .15s;}
  .vb:active{transform:scale(.94);}
  .vb.on.like{background:var(--inc-bg); border-color:var(--inc-bd); color:var(--inc); font-weight:800;}
  .vb.on.ok{background:var(--amber-bg); border-color:var(--amber-bd); color:var(--amber); font-weight:800;}
  .vb.on.no{background:var(--exc-bg); border-color:var(--exc-bd); color:var(--exc); font-weight:800;}

  .scard{background:var(--card); border:1px solid var(--line); border-radius:var(--r-card); padding:15px 16px; margin-bottom:12px; cursor:pointer; box-shadow:var(--sh); transition:transform .12s, box-shadow .2s;}
  .scard:active{transform:scale(.992); box-shadow:var(--sh-sm);}
  .scard .nm{font-size:17px; font-weight:800; letter-spacing:.2px; display:flex; align-items:center; gap:8px;}
  .scard .meta{font-size:13px; color:var(--muted); margin-top:4px; font-variant-numeric:tabular-nums;}
  .scard .tags{display:flex; flex-wrap:wrap; gap:6px; margin-top:9px;}
  .tag{font-size:11.5px; font-weight:600; background:var(--chip); border:1px solid var(--chip-bd); color:var(--chip-tx); border-radius:999px; padding:3px 10px;}
  .empty{text-align:center; color:var(--muted); padding:46px 18px; font-size:15px; line-height:1.85;}
  .empty .big{font-size:46px; display:block; margin-bottom:10px;}

  /* settings */
  .sect{background:var(--card); border:1px solid var(--line); border-radius:var(--r-card); padding:4px 16px; margin-bottom:16px; box-shadow:var(--sh);}
  .sect h2{font-size:12px; color:var(--muted); margin:15px 2px 6px; font-weight:800; letter-spacing:.7px;}
  .row{display:flex; align-items:center; gap:12px; padding:13px 2px; border-bottom:1px solid var(--line);}
  .row:last-child{border-bottom:none;}
  .row .lbl{flex:1; font-size:15px; font-weight:500;}
  .row .lbl small{display:block; color:var(--muted); font-size:12px; font-weight:400; margin-top:2px; line-height:1.4;}
  .stepper{display:flex; align-items:center; gap:0; border:1px solid var(--line); border-radius:11px; overflow:hidden; flex:0 0 auto;}
  .stepper button{width:38px; height:38px; border:none; background:var(--bg); color:var(--text); font-size:20px; cursor:pointer; font-family:inherit; transition:background .15s;}
  .stepper button:active{background:var(--chip);}
  .stepper b{min-width:36px; text-align:center; font-size:16px; font-weight:700;}
  .statline{display:flex; align-items:center; gap:10px; padding:10px 2px; font-size:15px; border-bottom:1px solid var(--line);}
  .statline:last-child{border-bottom:none;}
  .statline .rank{width:24px; height:24px; flex:0 0 auto; display:flex; align-items:center; justify-content:center; font-size:12px; color:#fff; font-weight:800; background:var(--grad); border-radius:8px;}
  .statline .nm{flex:1; font-weight:500;}
  .statline .ct{color:var(--brand); font-weight:800; font-variant-numeric:tabular-nums; white-space:nowrap;}
  .statline .del{background:none; border:none; color:var(--muted); font-size:18px; cursor:pointer; padding:2px 4px;}
  .ver{text-align:center; color:var(--muted); font-size:12px; margin-top:10px; line-height:1.6;}

  /* modal */
  .modal{position:fixed; inset:0; z-index:50; background:rgba(12,12,18,.5); backdrop-filter:blur(4px); -webkit-backdrop-filter:blur(4px); display:none; align-items:flex-end; justify-content:center;}
  .modal.show{display:flex; animation:mfade .26s ease;}
  @keyframes mfade{from{opacity:0}to{opacity:1}}
  @media(min-width:600px){ .modal{align-items:center;} }
  .sheet{background:var(--card); width:100%; max-width:640px; max-height:92vh; overflow:auto;
    border-radius:26px 26px 0 0; padding:8px 20px calc(22px + var(--safe-b)); box-shadow:var(--sh-lg);
    animation:sheetup .4s cubic-bezier(.16,1,.3,1);}
  .sheet::before{content:""; display:block; width:40px; height:4px; border-radius:99px; background:var(--line); margin:8px auto 16px;}
  @keyframes sheetup{from{transform:translateY(46px); opacity:.5}to{transform:none; opacity:1}}
  @media(min-width:600px){ .sheet{border-radius:24px; max-height:88vh;} }
  .sheet h2.title{margin:2px 0 16px; font-size:19px; font-weight:800;}
  .field{margin-bottom:15px;}
  .field label.flbl{display:block; font-size:12px; font-weight:800; color:var(--muted); margin-bottom:7px; letter-spacing:.5px;}
  .field input.tin, .field textarea.tin{width:100%; border:1px solid var(--line); background:var(--bg); color:var(--text); border-radius:13px; padding:13px 15px; font-size:16px; font-family:inherit; transition:border-color .2s, box-shadow .2s;}
  .field input.tin:focus, .field textarea.tin:focus{outline:none; border-color:var(--brand); box-shadow:0 0 0 3px rgba(255,94,58,.16);}
  .field textarea.tin{min-height:74px; resize:vertical;}
  .formbtns{display:flex; gap:11px; margin-top:6px;}
  .formbtns .btn{flex:1; padding:15px;}

  /* result */
  .result-card{text-align:center; padding:10px 4px 4px; animation:pop .4s cubic-bezier(.16,1,.3,1);}
  @keyframes pop{from{transform:scale(.95); opacity:.2}to{transform:none; opacity:1}}
  .relaxnote{font-size:13px; color:var(--amber); background:var(--amber-bg); border:1px solid var(--amber-bd); border-radius:12px; padding:9px 13px; margin-bottom:14px; line-height:1.5;}
  .r-eyebrow{font-size:12px; color:var(--muted); margin-bottom:10px; font-weight:800; letter-spacing:3px;}
  #r-name{font-size:38px; font-weight:900; line-height:1.2; margin:4px 0 6px; word-break:break-word;
    background:var(--grad); -webkit-background-clip:text; background-clip:text; color:transparent; -webkit-text-fill-color:transparent;}
  #r-name.spin{opacity:.92; filter:blur(.4px);}
  .r-info{margin:18px auto 6px; max-width:430px; text-align:left; background:var(--bg); border:1px solid var(--line); border-radius:16px; padding:4px 16px;}
  .r-info .ri{display:flex; gap:12px; padding:10px 0; border-bottom:1px solid var(--line); font-size:15px;}
  .r-info .ri:last-child{border-bottom:none;}
  .r-info .ri .k{color:var(--muted); width:46px; flex-shrink:0; font-weight:600; font-size:13px; padding-top:1px;}
  .r-info .tags{display:flex; flex-wrap:wrap; gap:6px;}

  .toast{position:fixed; left:50%; bottom:calc(var(--tab-h) + 34px); transform:translateX(-50%) translateY(8px);
    background:rgba(28,28,34,.96); color:#fff; padding:12px 20px; border-radius:999px; font-size:14px; font-weight:600; z-index:80;
    box-shadow:0 10px 30px rgba(0,0,0,.3); opacity:0; transition:opacity .25s, transform .25s; pointer-events:none; max-width:90%;}
  .toast.show{opacity:1; transform:translateX(-50%) translateY(0);}

  /* confetti */
  .confetti-root{position:fixed; inset:0; pointer-events:none; z-index:200; overflow:hidden;}
  .confetti-pc{position:absolute; top:32%; width:9px; height:14px; border-radius:2px; will-change:transform,opacity;}

  @media (prefers-reduced-motion: reduce){ *{animation:none !important; transition:none !important;} }

  /* 新手教學 */
  #onb-auto{ scroll-margin-top:90px; }
  #tour{ position:fixed; inset:0; z-index:2000; display:none; }
  #tour.show{ display:block; }
  #tourRing{ position:fixed; top:-60px; left:-60px; width:0; height:0; border-radius:14px;
    box-shadow:0 0 0 9999px rgba(12,15,18,.68); pointer-events:none;
    transition:top .35s cubic-bezier(.4,0,.2,1), left .35s cubic-bezier(.4,0,.2,1), width .35s cubic-bezier(.4,0,.2,1), height .35s cubic-bezier(.4,0,.2,1); }
  #tourRing::after{ content:""; position:absolute; inset:-3px; border-radius:16px; border:2px solid var(--brand);
    animation:tourpulse 1.7s ease-out infinite; }
  #tourRing.notarget::after{ display:none; }
  @keyframes tourpulse{ 0%{ box-shadow:0 0 0 0 rgba(255,122,69,.45);} 100%{ box-shadow:0 0 0 12px rgba(255,122,69,0);} }
  #tourCard{ position:fixed; left:16px; right:16px; max-width:520px; margin:0 auto; box-sizing:border-box;
    background:var(--card); border:1px solid var(--line); border-radius:20px; padding:18px 18px 16px;
    box-shadow:0 24px 60px rgba(0,0,0,.45); max-height:74vh; overflow:auto; }
  .tour-top{ display:flex; align-items:center; justify-content:space-between; margin-bottom:10px; }
  .tour-step{ font-size:12px; font-weight:700; letter-spacing:.04em; color:var(--brand);
    background:rgba(255,122,69,.12); padding:3px 10px; border-radius:999px; }
  .tour-skip{ margin-left:auto; background:none; border:none; color:var(--muted); font-size:13px; padding:4px 6px; cursor:pointer; }
  .tour-title{ font-size:19px; font-weight:800; line-height:1.35; margin-bottom:8px; }
  .tour-body{ font-size:14.5px; line-height:1.7; color:var(--text); white-space:pre-line; opacity:.92; }
  .tour-scene{ display:flex; flex-direction:column; gap:7px; margin:4px 0 2px; }
  .tbub-row{ display:flex; }
  .tbub-row.r{ justify-content:flex-end; }
  .tbub{ max-width:80%; padding:8px 13px; border-radius:16px; font-size:14.5px; line-height:1.4;
    opacity:0; transform:translateY(7px); animation:bubin .45s ease forwards; }
  .tbub.l{ background:var(--line); color:var(--text); border-bottom-left-radius:5px; }
  .tbub.r{ background:var(--grad); color:#fff; border-bottom-right-radius:5px; }
  .tbub.big{ font-size:30px; padding:2px 8px; background:none; }
  .tour-scene-cap{ margin-top:14px; font-size:14px; line-height:1.6; color:var(--text); opacity:0; transform:translateY(7px); animation:bubin .5s ease forwards; }
  @keyframes bubin{ to{ opacity:1; transform:none; } }
  .tour-nav{ display:flex; gap:10px; margin-top:16px; }
  .tour-prev{ background:none; border:1px solid var(--line); color:var(--muted); border-radius:12px; padding:11px 14px; font-size:14px; font-weight:600; cursor:pointer; }
  .tour-next{ flex:1; background:var(--grad); color:#fff; border:none; border-radius:12px; padding:11px 16px; font-size:15px; font-weight:700; cursor:pointer; box-shadow:0 8px 20px rgba(255,86,48,.3); }
  /* 家的位置提醒 */
  #homeHint:empty{ display:none; }
  .homehint{ display:flex; align-items:center; gap:10px; margin:0 0 12px;
    background:linear-gradient(135deg, rgba(255,122,69,.15), rgba(255,86,48,.07));
    border:1px solid rgba(255,122,69,.32); border-radius:14px; padding:11px 12px; }
  .hh-ic{ flex:0 0 auto; color:var(--brand); display:flex; }
  .hh-ic svg{ width:22px; height:22px; }
  .hh-tx{ flex:1; font-size:13.5px; line-height:1.5; color:var(--text); }
  .hh-tx b{ color:var(--brand); font-weight:700; }
  .hh-go{ flex:0 0 auto; background:var(--grad); color:#fff; border:none; border-radius:10px;
    padding:8px 12px; font-size:13px; font-weight:700; cursor:pointer; white-space:nowrap; }
  .hh-x{ flex:0 0 auto; background:none; border:none; color:var(--muted); font-size:15px; cursor:pointer; padding:2px 5px; line-height:1; }
  .hh-warn{ color:var(--brand); font-weight:600; }
  .row.flash{ animation:rowflash 1.6s ease; }
  @keyframes rowflash{ 0%,100%{ background:transparent; } 25%,60%{ background:rgba(255,122,69,.16); } }
  .drawintro{ display:flex; gap:9px; align-items:flex-start; margin:0 0 14px;
    background:linear-gradient(135deg, rgba(255,122,69,.13), rgba(255,86,48,.06));
    border:1px solid rgba(255,122,69,.30); border-radius:14px; padding:11px 13px;
    font-size:13.5px; line-height:1.6; color:var(--text); }
  .drawintro b{ color:var(--brand); font-weight:700; }
  .di-ic{ flex:0 0 auto; font-size:16px; line-height:1.5; }
  /* 篩選滑桿（質感版） */
  .slbox{ padding:0 4px; }
  .slends{ display:flex; justify-content:space-between; font-size:12px; color:var(--muted); margin-top:11px; font-weight:600; }
  .slwrap{ position:relative; height:40px; margin-top:26px; }
  .sltrack{ position:absolute; top:50%; left:0; right:0; height:10px; transform:translateY(-50%); border-radius:6px;
    background:var(--chip); box-shadow:inset 0 1px 3px rgba(0,0,0,.14), 0 1px 0 rgba(255,255,255,.55); }
  .slfill{ position:absolute; top:0; bottom:0; left:0; width:0; border-radius:6px; background:var(--grad);
    transition:none; }
  .slticks{ position:absolute; inset:0; pointer-events:none; }
  .slt{ position:absolute; top:50%; width:4px; height:4px; border-radius:50%; transform:translate(-50%,-50%);

<script>
"use strict";

/* ---------- 資料層 ---------- */
const KEY = "eat-what-data";
// ★ 上架用：部署 Cloudflare Worker（見 worker.js）後，把下面換成你的 Worker 網址 ★
const DISTANCE_PROXY = "https://eat-dist.a23860276.workers.dev";
const CATS = [
  {key:"staple",  label:"主食", multi:true},
  {key:"cuisine", label:"菜系", multi:true},
  {key:"meals",   label:"餐別", multi:true},
  {key:"distance",label:"車程", multi:false},
  {key:"price",   label:"價位", multi:false},
];
const CAT_LABEL = Object.fromEntries(CATS.map(c=>[c.key,c.label]));
const DEFAULT_TAGS = {
  staple:["麵","飯","鍋物","麵食","其他"],
  cuisine:["中式","西式","日式","東南亞","韓式"],
  meals:["早餐","午餐","晚餐","宵夜"],
  distance:["步行可到","5分鐘內","10分鐘內","15分鐘內","20分鐘內","30分鐘內","30分鐘以上"],
  price:["100以內","100~200","200~300","300~500","500以上"],

const VOTE_LABEL = {like:"喜歡", ok:"普通", no:"不喜歡"};
const DEFAULT_HOME = {label:"向上路五段（南屯）", lat:24.1513579, lng:120.6102249, area:"臺中市"};
function defaults(){
  return {version:1, stores:[], tagOptions:JSON.parse(JSON.stringify(DEFAULT_TAGS)),
    log:[], settings:{avoidRecent:true, avoidWindow:5, animation:true, openMaps:true, excludeDisliked:false, chainNearest:true, solo:false, theme:"auto", user1:"我", user2:"伴侶/朋友", googleKey:"", homeSet:false, homeHintDismissed:false, drawIntroSeen:false, home:Object.assign({},DEFAULT_HOME)}};
}
function uid(){ return (crypto.randomUUID && crypto.randomUUID()) || ("id-"+Date.now()+"-"+Math.random().toString(36).slice(2)); }
function clamp(n,a,b){ return Math.max(a, Math.min(b, n)); }

// 多值欄位可吃陣列或「、，,/」分隔字串
function toArr(v){
  if(Array.isArray(v)) return v.map(x=>String(x).trim()).filter(Boolean);
  if(v==null) return [];
  return String(v).split(/[、，,/／|・]+/).map(x=>x.trim()).filter(Boolean);
}
function toStr(v){ const x = Array.isArray(v) ? (v.length?v[0]:"") : (v==null?"":v); return String(x).trim(); }
function numOrNull(v){ const n=parseFloat(v); return isFinite(n)? n : null; }
const CUISINE_REMAP = {"盛食咖哩店-勤美店":["東南亞"],"雲河星空景觀餐廳":["中式","西式"]};
function migrateCuisine(arr, name){
  arr = (arr||[]).filter(function(c){ return c!=="其他"; });
  if(arr.length===0 && CUISINE_REMAP[name]) return CUISINE_REMAP[name].slice();
  return arr;
}
function applyTheme(){ const t=state.settings.theme||"auto"; if(t==="auto") document.documentElement.removeAttribute("data-theme"); else document.documentElement.setAttribute("data-theme",t); }
function migrateDistance(v){
  if(v==="車程20分鐘以上" || v==="20~30分鐘" || v==="車程20~30分鐘") return "30分鐘內";
  return (v && v.indexOf("車程")===0) ? v.slice(2) : v;
}
function normStore(s){
  s = s || {};
  const pick=(...keys)=>{ for(const k of keys){ const val=s[k]; if(val!=null && val!=="") return val; } return undefined; };
  return {
    id: s.id || uid(),
    name: String(pick("name","餐廳","店名")||"").trim(),
    staple: toArr(pick("staple","主食")),
    cuisine: migrateCuisine(toArr(pick("cuisine","菜系")), String(pick("name","餐廳","店名")||"").trim()),
    meals: toArr(pick("meals","餐別")),
    distance: migrateDistance(toStr(pick("distance","距離"))),
    price: toStr(pick("price","價位")),
    location: String(pick("location","地址","地點")||""),
    note: String(pick("note","備註")||""),
    votes: Array.isArray(s.votes)? [s.votes[0]||"", s.votes[1]||""] : ["",""],
    createdAt: s.createdAt||Date.now(), updatedAt: s.updatedAt||Date.now(),
  };
}
function normalize(d){
  const out = defaults();
  if(!d || typeof d!=="object") return out;
  // tagOptions：保留使用者選項，並確保每個分類都存在
  for(const k of Object.keys(DEFAULT_TAGS)){
    const v = d.tagOptions && d.tagOptions[k];
    out.tagOptions[k] = Array.isArray(v) ? Array.from(new Set(v.map(String))) : DEFAULT_TAGS[k].slice();
  }
  out.tagOptions.distance = DEFAULT_TAGS.distance.slice();
  out.tagOptions.cuisine = DEFAULT_TAGS.cuisine.slice();
  out.stores = Array.isArray(d.stores) ? d.stores.map(normStore) : [];
  out.log = Array.isArray(d.log) ? d.log.filter(x=>x&&x.id).map(x=>({id:x.id, name:String(x.name||""), ts:x.ts||Date.now()})) : [];
  out.settings = Object.assign(out.settings, d.settings||{});
  out.settings.avoidRecent = !!out.settings.avoidRecent;
  out.settings.animation = !!out.settings.animation;
  out.settings.openMaps = out.settings.openMaps!==false;
  out.settings.excludeDisliked = !!out.settings.excludeDisliked;
  out.settings.user1 = String(out.settings.user1||"").trim().slice(0,12) || "我";
  out.settings.user2 = String(out.settings.user2||"").trim().slice(0,12) || "伴侶/朋友";
  var _h = d.settings && d.settings.home; out.settings.home = (_h && numOrNull(_h.lat)!=null) ? {label:String(_h.label||DEFAULT_HOME.label), lat:numOrNull(_h.lat), lng:numOrNull(_h.lng), area:String(_h.area||"")||DEFAULT_HOME.area} : Object.assign({},DEFAULT_HOME);
  out.settings.googleKey = String(out.settings.googleKey||"");
  out.settings.homeSet = !!out.settings.homeSet;
  out.settings.homeHintDismissed = !!out.settings.homeHintDismissed;
  out.settings.drawIntroSeen = !!out.settings.drawIntroSeen;
  out.settings.chainNearest = out.settings.chainNearest!==false;
  out.settings.solo = !!out.settings.solo;
  out.settings.theme = ["auto","light","dark"].indexOf(out.settings.theme)>=0 ? out.settings.theme : "auto";
  out.settings.avoidWindow = clamp(parseInt(out.settings.avoidWindow)||5, 1, 20);
  return out;
}
function load(){
  try{ const raw = localStorage.getItem(KEY); return raw ? normalize(JSON.parse(raw)) : defaults(); }
  catch(e){ console.warn(e); return defaults(); }
}
function save(){
  try{ localStorage.setItem(KEY, JSON.stringify(state)); }
  catch(e){ alert("儲存失敗：瀏覽器可能在無痕模式或限制了本機儲存。請改用一般視窗，或用「匯出 JSON」備份。"); }
}
let state = load();

/* ---------- 小工具 ---------- */
const $ = (s,r=document)=>r.querySelector(s);
const $$ = (s,r=document)=>Array.from(r.querySelectorAll(s));
function esc(s){ return String(s).replace(/[&<>"']/g, c=>({"&":"&amp;","<":"&lt;",">":"&gt;",'"':"&quot;","'":"&#39;"}[c])); }
let toastTimer;
function toast(msg){
  const t=$("#toast"); t.textContent=msg; t.classList.add("show");
  clearTimeout(toastTimer); toastTimer=setTimeout(()=>t.classList.remove("show"), 1800);
}
function reducedMotion(){ try{ return matchMedia("(prefers-reduced-motion: reduce)").matches; }catch(e){ return false; } }
function dateStr(){ const d=new Date(); const p=n=>String(n).padStart(2,"0"); return d.getFullYear()+p(d.getMonth()+1)+p(d.getDate()); }

/* ---------- 篩選狀態（僅此次使用，不寫入儲存） ---------- */
let filters = {staple:{},cuisine:{},meals:{},distance:{},price:null};
function autoMeal(){
  const now=new Date(), t=now.getHours()*60+now.getMinutes();
  const m = (t>=361&&t<=660)?"早餐":(t>=661&&t<=900)?"午餐":(t>=901&&t<=1260)?"晚餐":"宵夜"; // 早6:01-11:00 午-15:00 晚-21:00 宵夜其餘
  if(state.tagOptions.meals.indexOf(m)>=0) filters.meals={[m]:1};
}
function toggleFilter(cat, opt){ if(filters[cat][opt]===1) delete filters[cat][opt]; else filters[cat][opt]=1; }
function setMeal(opt){ filters.meals = {[opt]:1}; }
function selectAllFilter(cat){ (state.tagOptions[cat]||[]).forEach(o=>filters[cat][o]=1); }
function clearFilters(){ filters={staple:{},cuisine:{},meals:{},distance:{},price:null}; selectAllFilter("staple"); selectAllFilter("cuisine"); autoMeal(); }
// 距離為「最遠可接受」門檻（單選），選 20 分鐘內＝包含步行/5/10/15 分鐘內
function setDistanceThreshold(opt){ filters.distance = filters.distance[opt] ? {} : {[opt]:1}; }
function matchesFilters(store){
  for(const cat of CATS){
    if(cat.key==="distance"){
      const sel = Object.keys(filters.distance)[0];
      if(sel){
        const order = state.tagOptions.distance;
        const r = order.indexOf(store.distance);
        if(r<0 || r>order.indexOf(sel)) return false;
      }
      continue;
    }
    if(cat.key==="price"){
      if(filters.price){
        const order=state.tagOptions.price;
        const pi=order.indexOf(store.price);
        if(pi<0 || pi<filters.price.lo || pi>filters.price.hi) return false;
      }
      continue;
    }
    const sel = filters[cat.key];                 // 只有「要」(綠) 的值
    const vals = store[cat.key]||[];
    if(!vals.some(v=>sel[v]===1)) return false;    // 該類沒有任何「要」的值命中 → 排除
  }
  return true;
}

/* ---------- 分頁 ---------- */
let currentTab = "home";
function switchTab(tab){
  currentTab = tab;
  document.body.className = "tab-"+tab;
  $$(".view").forEach(v=>v.classList.remove("active"));
  $("#view-"+tab).classList.add("active");
  $$("nav.tabbar button").forEach(b=>b.classList.toggle("active", b.dataset.tab===tab));
  if(tab==="stores") renderStores();
  if(tab==="settings") renderSettings();
  if(tab==="home") renderHome();
  window.scrollTo(0,0);
}

/* ---------- 主畫面：條件 ---------- */
function renderFilters(){
  let html="";
  for(const cat of CATS){
    const opts = state.tagOptions[cat.key]||[];
    if(!opts.length) continue;
    if(cat.key==="distance"){ html += distanceSliderHTML(opts); continue; }
    if(cat.key==="price"){ html += priceSliderHTML(opts); continue; }
    if(cat.key==="meals"){
      const chips = opts.map(o=>{
        const on = filters.meals[o]===1;
        return `<button class="chip${on?" inc":""}" data-cat="meals" data-opt="${esc(o)}" data-single="1">${esc(o)}</button>`;
      }).join("");
      html += `<div class="fgroup"><div class="fglabel">${cat.label}</div><div class="chips">${chips}</div></div>`;
      continue;
    }
    const chips = opts.map(o=>{
      const on = filters[cat.key][o]===1;
      return `<button class="chip ${on?"inc":"exc"}" data-cat="${cat.key}" data-opt="${esc(o)}">${esc(o)}</button>`;
    }).join("");
    html += `<div class="fgroup"><div class="fglabel">${cat.label}</div><div class="chips">${chips}</div></div>`;
  }
  $("#filters").innerHTML = html;
  requestAnimationFrame(layoutSliders);
}
function distanceSliderHTML(opts){
  const max = opts.length-1;
  const sel = Object.keys(filters.distance)[0];
  const idx = sel ? opts.indexOf(sel) : max;
  return `<div class="fgroup"><div class="fglabel">車程 <span class="muted">（最遠可接受）</span></div>
    <div class="slbox"><div class="slwrap">
      <div class="sltrack"><div class="slfill" id="distFill"></div><div class="slticks" id="distTicks"></div></div>
      <div class="slbubble" id="distBubble"></div>
      <input type="range" class="rng solo" id="distSlider" min="0" max="${max}" step="any" value="${idx}">
    </div><div class="slends"><span>${esc(opts[0])}</span><span>${esc(opts[max])}</span></div></div></div>`;
}
function priceBounds(label){
  var m;
  if(m=label.match(/^(\d+)[~～](\d+)$/)) return [+m[1], +m[2]];
  if(m=label.match(/^(\d+)以內$/)) return [0, +m[1]];
  if(m=label.match(/^(\d+)以上$/)) return [+m[1], null];
  return [0, null];
}
function priceRangeLabel(opts, lo, hi){
  const max=opts.length-1;
  if(lo===0 && hi===max) return "不限";
  const loMin = priceBounds(opts[lo])[0];
  const hiMax = priceBounds(opts[hi])[1];
  return hiMax===null ? (loMin+"以上") : (loMin+"~"+hiMax);
}
function priceSliderHTML(opts){
  const max = opts.length-1;
  const lo = filters.price ? filters.price.lo : 0;

const SL_THUMB = 28;

function layoutTicks(el, n, w, lo, hi){

function lcpLen(a,b){ var i=0, m=Math.min(a.length,b.length); while(i<m && a[i]===b[i]) i++; return i; }
function collapseChains(list){
  // 同品牌連鎖（依店名開頭自動辨識）只留離家最近的一家
  if(!state.settings.chainNearest || list.length<2) return list;
  var order = state.tagOptions.distance;
  var rank = function(s){ var i=order.indexOf(s.distance); return i<0 ? 99 : i; };
  var nm = function(s){ return (s.name||"").trim().toLowerCase(); };
  var n=list.length, parent=[];
  for(var i=0;i<n;i++) parent[i]=i;
  var find=function(x){ while(parent[x]!==x){ parent[x]=parent[parent[x]]; x=parent[x]; } return x; };
  for(var i=0;i<n;i++) for(var j=i+1;j<n;j++){
    if(lcpLen(nm(list[i]), nm(list[j]))>=3) parent[find(i)]=find(j);  // 開頭相同 ≥3 字 → 同品牌
  }
  var groups={}, out=[];
  for(var i=0;i<n;i++){ var r=find(i); (groups[r]=groups[r]||[]).push(list[i]); }
  for(var k in groups){
    var g=groups[k], best=g[0];
    for(var t=1;t<g.length;t++){ if(rank(g[t])<rank(best)) best=g[t]; }  // 留最近級距

  }

}
function currentCandidates(){

}

/* ---------- 隨機抽選 ---------- */
let currentList=[], currentRelaxed=false, currentPick=null;
let vetoUsed={}, vetoedIds=[], vetoDisabled=[false,false]; // 兩人否決權：每輪每人各一次
function resetRound(){ vetoUsed={}; vetoedIds=[]; }
function userNames(){ return [ state.settings.user1||"我", state.settings.user2||"伴侶/朋友" ]; }
function applyAvoid(cands){
  if(!state.settings.avoidRecent) return {list:cands, relaxed:false};
  const recent = state.log.slice(0, state.settings.avoidWindow).map(x=>x.id);
  const filtered = cands.filter(s=>!recent.includes(s.id));
  if(filtered.length===0) return {list:cands, relaxed:true};
  return {list:filtered, relaxed:false};
}
function pickFrom(list, avoidIds){
  avoidIds = avoidIds || [];

}
function decide(){
  if(state.stores.length===0){ openResultEmpty("noStore"); return; }
  const cands = currentCandidates();

  openResult(list, relaxed);
}
function openResult(list, relaxed){

    const used = !!vetoUsed[i];

    return `<button class="btn veto" id="veto${i}" ${vetoDisabled[i]?"disabled":""}>${label}</button>`;
  };

      <button class="linkbtn" id="mapBtn"><svg class='bic' viewBox='0 0 24 24' fill='none' stroke='currentColor' stroke-width='2' stroke-linecap='round' stroke-linejoin='round'><path d='M12 21s-7-5.5-7-11a7 7 0 0 1 14 0c0 5.5-7 11-7 11Z'/><circle cx='12' cy='10' r='2.5'/></svg> 看地圖</button>
      <button class="linkbtn" id="resultClose">關閉</button>
    </div>`;
  $("#veto0").onclick = ()=> vetoPick(0);
  { const _v1=$("#veto1"); if(_v1) _v1.onclick = ()=> vetoPick(1); }
  $("#acceptBtn").onclick = acceptPick;

function fmtDate(ts){ const d=new Date(ts); const p=n=>String(n).padStart(2,"0"); return (d.getMonth()+1)+"/"+d.getDate()+" "+p(d.getHours())+":"+p(d.getMinutes()); }

/* ---------- 匯出 / 匯入 / 清除 / 範例 ---------- */
function exportData(){
  const blob = new Blob([JSON.stringify(state,null,2)], {type:"application/json"});
  const url = URL.createObjectURL(blob);
  const a = document.createElement("a");
  a.href=url; a.download="吃這-備份-"+dateStr()+".json";
  document.body.appendChild(a); a.click(); a.remove();
  setTimeout(()=>URL.revokeObjectURL(url),1500);
  toast("已匯出備份");
}
function importData(file){
  const reader = new FileReader();
  reader.onload = ()=>{
    try{
      const data = JSON.parse(reader.result);
      if(!data || !Array.isArray(data.stores)) throw new Error("格式不符");
      if(!confirm("匯入會「覆蓋」目前所有資料，確定嗎？")) return;
      state = normalize(data); save();
      clearFilters(); autoMeal();
      renderHome(); renderStores(); renderSettings();
      toast("已匯入 "+state.stores.length+" 間店家");
    }catch(e){ alert("匯入失敗：這個檔案看起來不是有效的備份 JSON。"); }
  };
  reader.readAsText(file);
}
function importMerge(file){
  const reader = new FileReader();
  reader.onload = ()=>{
    try{
      const data = JSON.parse(reader.result);
      const incoming = Array.isArray(data) ? data : (Array.isArray(data.stores) ? data.stores : null);
      if(!incoming) throw new Error("格式不符");
      const existing = new Set(state.stores.map(s=>(s.name||"").trim()));
      let added=0, skipped=0;
      incoming.forEach(s=>{
        const st = normStore(s);
        if(!st.name){ return; }
        if(existing.has(st.name.trim())){ skipped++; return; }
        st.id = uid(); state.stores.push(st); existing.add(st.name.trim()); added++;
      });
      if(data.tagOptions){ for(const k of Object.keys(DEFAULT_TAGS)){ const v=data.tagOptions[k]; if(Array.isArray(v)) v.forEach(x=>{ if(state.tagOptions[k].indexOf(x)<0) state.tagOptions[k].push(x); }); } }
      save();
      clearFilters(); autoMeal();
      renderHome(); renderStores(); renderSettings();
      toast("合併完成：新增 "+added+" 間"+(skipped?("，略過重複 "+skipped+" 間"):""));
    }catch(e){ alert("合併匯入失敗：這個檔案看起來不是有效的清單 JSON。"); }
  };
  reader.readAsText(file);
}
function clearAll(){
  if(!confirm("確定要清除所有資料？此動作無法復原（建議先匯出備份）。")) return;
  state = defaults(); save();
  clearFilters(); autoMeal();
  renderHome(); renderStores(); renderSettings();
  toast("已清除所有資料");
}

let citySel = new Set();
function openCityImport(){ citySel = new Set(); renderCityGrid(); showModal("#cityModal"); }
function cityGridHTML(){
  return COUNTIES.map(function(c){
    var has = !!CITY_LISTS[c], on = citySel.has(c);
    return '<button class="citychip'+(on?" on":"")+(has?"":" off")+'" data-city="'+c+'"'+(has?"":" disabled")+'>'+c+'<small>'+(has?(CITY_LISTS[c].length+" 間"):"尚無")+'</small></button>';
  }).join("");
}
function renderCityGrid(){ $("#cityGrid").innerHTML = cityGridHTML(); }
function doCityImport(){
  if(citySel.size===0){ toast("請先選一個縣市 🙂"); return; }
  var have = new Set(state.stores.map(function(s){ return s.name; })), added=0;
  citySel.forEach(function(c){ (CITY_LISTS[c]||[]).forEach(function(s){
    if(have.has(s.name)) return;
    var st=normStore(s); st.id=uid(); state.stores.push(st); have.add(s.name); added++;
  }); });
  save(); renderStores(); renderSettings(); if(currentTab==="home") renderHome();
  hideModal("#cityModal");
  toast(added ? ("已匯入 "+added+" 間店家 🎉") : "所選縣市的店家都已經在清單裡了 🙂");
  if(added) switchTab("stores");
}

/* ---------- 距離（Google Places API New 取座標 → 只存級距、不存座標；之後可換 OSRM 精確版） ---------- */
function proxyReady(){ return !!DISTANCE_PROXY && DISTANCE_PROXY.indexOf("YOUR-WORKER")<0; }
// 透過你的 Cloudflare Worker 代理查座標（Google 金鑰藏在 Worker 後端，不在前端）
async function googleGeocode(query, bias, withArea){
  if(!proxyReady()) throw {code:"NOPROXY"};
  const body = { q: query };
  if(bias && bias.lat!=null){ body.lat=bias.lat; body.lng=bias.lng; }
  if(withArea) body.withArea = true;
  const r = await fetch(DISTANCE_PROXY, { method:"POST", headers:{ "Content-Type":"application/json" }, body: JSON.stringify(body) });
  if(r.status===401 || r.status===403) throw {code:"AUTH", status:r.status};
  if(!r.ok) throw {code:"HTTP", status:r.status};
  const j = await r.json();
  if(!j || !j.result) return null;
  return { lat:j.result.lat, lng:j.result.lng, name:j.result.name||query, area:j.result.area||"" };
}
function haversineKm(aLat,aLng,bLat,bLng){
  const R=6371, t=Math.PI/180;
  const dLat=(bLat-aLat)*t, dLng=(bLng-aLng)*t;
  const s=Math.sin(dLat/2)**2 + Math.cos(aLat*t)*Math.cos(bLat*t)*Math.sin(dLng/2)**2;
  return 2*R*Math.asin(Math.min(1,Math.sqrt(s)));
}
const WALK_KM = 0.5;
const MIN_PER_KM = 2.8;
const MIN_BUCKETS = [[5,"5分鐘內"],[10,"10分鐘內"],[15,"15分鐘內"],[20,"20分鐘內"],[30,"30分鐘內"]];
function minutesToBucket(min){ for(const b of MIN_BUCKETS){ if(min<=b[0]) return b[1]; } return "30分鐘以上"; }
/* ★ 未來要換「精確車程」只改這個函式：改成 await 呼叫 OSRM / OpenRouteService 即可，其它都不用動 */
async function estimateDriveMinutes(home, s){
  const km = haversineKm(home.lat, home.lng, s.lat, s.lng);
  return km * MIN_PER_KM;
  // OSRM 版（未來）：
  // const u = "https://router.project-osrm.org/route/v1/driving/"+home.lng+","+home.lat+";"+s.lng+","+s.lat+"?overview=false";
  // const j = await fetch(u).then(r=>r.json()); return j.routes[0].duration/60;
}
async function distanceBucketFor(home, s){
  if(!(home && home.lat!=null && s && s.lat!=null)) return null;
  const km = haversineKm(home.lat, home.lng, s.lat, s.lng);
  if(km <= WALK_KM) return "步行可到";
  return minutesToBucket(await estimateDriveMinutes(home, s));
}

async function autoFillDistances(){
  const home = state.settings.home;
  if(!home || home.lat==null){ alert("請先在上面設定『家的位置』。"); return; }
  if(!proxyReady()){ alert("此功能暫時無法使用，請稍後再試。"); return; }
  if(!(await requireUnlock("distance"))) return;
  const todo = state.stores.filter(function(s){ return !s.distance; });
  if(!todo.length){ alert("所有店家都已經有距離了 🙂"); return; }
  if(!confirm("要自動幫 "+todo.length+" 間「沒有距離」的店家估算距離嗎？")) return;
  const btn=$("#btn-autodist"); if(btn) btn.disabled=true;
  let filled=0; const problems=[]; let aborted=null;
  for(let i=0;i<todo.length;i++){
    const s=todo[i];
    if(btn) btn.textContent="處理中… "+(i+1)+"/"+todo.length;
    try{
      const g = await googleGeocode(s.name, home);
      if(!g){ problems.push(s.name); continue; }
      const bucket = await distanceBucketFor(home, {lat:g.lat, lng:g.lng}); // 算完即丟座標
      if(!bucket){ problems.push(s.name); continue; }
      s.distance = bucket; s.updatedAt=Date.now(); filled++;
      await sleep(120);
    }catch(e){
      if(e && (e.code==="AUTH"||e.code==="NOPROXY")){ aborted=e; break; }
      problems.push(s.name);
    }
  }
  save(); renderStores(); renderSettings(); if(currentTab==="home") renderHome();
  const b=$("#btn-autodist"); if(b){ b.disabled=false; b.textContent="開始"; }
  if(aborted){ alert("服務暫時無法使用，請稍後再試。"); return; }
  let msg="完成！已自動填上 "+filled+" 間的距離。";
  if(problems.length){ msg += "\n\n有 "+problems.length+" 間查不到、已略過（請手動設定距離）：\n" + problems.slice(0,20).join("、") + (problems.length>20?" …":""); }
  alert(msg);
}

// 透過 Worker 呼叫 AI（OpenAI + web search），回傳合法標籤；座標/原始資料都不存
async function aiClassify(name, note){
  if(!proxyReady()) throw {code:"NOPROXY"};
  const home = state.settings.home || {};
  const body = { op:"classify", name:name, note:note||"", area:home.area||"", lat:home.lat, lng:home.lng,
    options:{ staple:state.tagOptions.staple, cuisine:state.tagOptions.cuisine, meals:state.tagOptions.meals, price:state.tagOptions.price } };
  const r = await fetch(DISTANCE_PROXY, { method:"POST", headers:{ "Content-Type":"application/json" }, body: JSON.stringify(body) });
  if(r.status===401 || r.status===403) throw {code:"AUTH", status:r.status};
  if(r.status===500){ const t=await r.json().catch(()=>({})); if(t && t.error==="no-openai-key") throw {code:"NOAI"}; throw {code:"HTTP", status:500}; }
  if(!r.ok) throw {code:"HTTP", status:r.status};
  const j = await r.json();
  if(!j || !j.result) return null;
  const x=j.result;
  return { staple:x.staple||[], cuisine:x.cuisine||[], meals:x.meals||[], price:x.price||"" };
}

// 一鍵自動分類：只處理「還沒分類」的店（主食/菜系/餐別都空白），只填空欄、不覆蓋
async function autoClassify(){
  if(!proxyReady()){ alert("此功能暫時無法使用，請稍後再試。"); return; }
  if(!(await requireUnlock("classify"))) return;
  const todo = state.stores.filter(function(s){ return (s.staple||[]).length===0 && (s.cuisine||[]).length===0 && (s.meals||[]).length===0; });
  if(!todo.length){ alert("沒有「還沒分類」的店家 🙂（只會處理主食/菜系/餐別都空白的店）"); return; }
  if(!confirm("要自動幫 "+todo.length+" 間「還沒分類」的店家填上標籤嗎？\n（自動判斷主食／菜系／餐別／價位，不含距離）")) return;
  const btn=$("#btn-autoclass"); if(btn) btn.disabled=true;
  let filled=0; const problems=[]; let aborted=null;
  for(let i=0;i<todo.length;i++){
    const s=todo[i];
    if(btn) btn.textContent="處理中… "+(i+1)+"/"+todo.length;
    try{
      const g = await aiClassify(s.name, s.note);
      if(!g){ problems.push(s.name); continue; }
      let any=false;
      if((s.staple||[]).length===0 && g.staple.length){ s.staple=g.staple; any=true; }
      if((s.cuisine||[]).length===0 && g.cuisine.length){ s.cuisine=g.cuisine; any=true; }
      if((s.meals||[]).length===0 && g.meals.length){ s.meals=g.meals; any=true; }
      if(!s.price && g.price){ s.price=g.price; any=true; }
      if(any){ s.updatedAt=Date.now(); filled++; } else { problems.push(s.name); }
    }catch(e){
      if(e && (e.code==="AUTH"||e.code==="NOPROXY"||e.code==="NOAI")){ aborted=e; break; }
      problems.push(s.name);
    }
    await sleep(200);
  }
  save(); renderStores(); renderSettings(); if(currentTab==="home") renderHome();
  const b=$("#btn-autoclass"); if(b){ b.disabled=false; b.textContent="開始"; }
  if(aborted){
    alert("服務暫時無法使用，請稍後再試。");
    return;
  }
  let msg="完成！已幫 "+filled+" 間自動分類。";
  if(problems.length){ msg += "\n\n有 "+problems.length+" 間找不到資料、已略過：\n"+problems.slice(0,20).join("、")+(problems.length>20?" …":""); }
  msg += "\n\n（自動判斷僅供參考，建議到「店家」確認一下，尤其價位。）";
  alert(msg);
}

  tourGo(tourIdx+1);
}
function addressHTML(){
  return '<div class="tour-addr">'+
    '<p class="onb-desc">先告訴我你家大概在哪，我就<b>立刻幫你把每間店的距離算好</b>——之後抽選用「車程」篩選才會準，超方便。</p>'+
    '<input type="search" id="onbAddr" class="onb-input" placeholder="住家地址或附近地標（例：嶺東科技大學）" autocomplete="off">'+
    '<div class="onb-status" id="onbStatus"></div>'+
    '<button class="tour-next" id="onbGo">設定，並自動算距離</button>'+
    '<button class="onb-skip" id="onbSkip">先跳過，之後到「設定」也能用</button>'+
  '</div>';
}
function wireAddressStep(){
  var go=$("#onbGo"), skip=$("#onbSkip"), inp=$("#onbAddr");
  if(go) go.onclick = runOnboardAddress;
  if(skip) skip.onclick = function(){ tourGo(tourIdx+1); };
  if(inp) inp.onkeydown = function(e){ if(e.key==="Enter"){ e.preventDefault(); runOnboardAddress(); } };
}
async function runOnboardAddress(){
  var inp=$("#onbAddr"), go=$("#onbGo"), skip=$("#onbSkip"), status=$("#onbStatus");
  var q=(inp.value||"").trim();
  if(!q){ status.className="onb-status err"; status.textContent="先輸入你家地址或附近地標 🙂"; inp.focus(); return; }
  go.disabled=true; inp.disabled=true; skip.style.visibility="hidden";
  status.className="onb-status working"; status.textContent="正在定位你家…";
  try{
    if(!proxyReady()) throw {code:"NOPROXY"};
    var g = await googleGeocode(q, state.settings.home, true);
    if(!g){ status.className="onb-status err"; status.textContent="查不到這個地點，換個地標或地址再試一次。"; go.disabled=false; inp.disabled=false; skip.style.visibility=""; return; }
    state.settings.home = {label:(g.name||q)+(g.area?("，"+g.area):""), lat:g.lat, lng:g.lng, area:g.area||""};
    state.settings.homeSet=true; save();
    var todo = state.stores.filter(function(s){ return !s.distance; });
    var unlocked = await requireUnlock("distance");
    if(unlocked && todo.length){
      status.textContent="位置設定好了 ✅ 正在幫 "+todo.length+" 間店算距離，請稍候…（0/"+todo.length+"）";
      var n = await onboardAutoDistances(todo, function(c){ status.textContent="正在算距離，請稍候…（"+c+"/"+todo.length+"）"; });
      status.className="onb-status done"; status.textContent="搞定！已幫 "+n+" 間店算好距離 🎉";
    } else {
      status.className="onb-status done"; status.textContent="位置設定好了 ✅";
    }
    await sleep(900);
    tourGo(tourIdx+1);
  }catch(e){
    status.className="onb-status err";
    status.textContent = (e&&e.code==="AUTH") ? "服務暫時無法使用，請稍後再試（也可先跳過）。" : "連線失敗，請檢查網路後再試（也可先跳過）。";
    go.disabled=false; inp.disabled=false; skip.style.visibility="";
  }
}
async function onboardAutoDistances(todo, onProgress){
  var home = state.settings.home, done=0, idx=0;
  async function worker(){
    while(idx < todo.length){
      var s = todo[idx++];
      try{
        var g = await googleGeocode(s.name, home);
        if(g){ var bucket = await distanceBucketFor(home, {lat:g.lat, lng:g.lng}); if(bucket){ s.distance=bucket; s.updatedAt=Date.now(); } }
      }catch(e){}
      done++; if(onProgress) onProgress(done);
    }
  }
  var ws=[]; for(var i=0;i<Math.min(5, todo.length);i++) ws.push(worker());
  await Promise.all(ws);
  save(); renderStores(); renderSettings(); renderHomeHint(); if(currentTab==="home") renderHome();
  return done;
}
function tourGo(i){
  if(i<0) return;
  if(i>=TOUR.length){ endTour(); return; }
  tourIdx = i;
  const step = TOUR[i];
  switchTab(step.tab);
  const nav = $("#tourNav");
  if(step.scene){
    $("#tourStep").style.display = "none";
    $("#tourTitle").style.display = "none";
    $("#tourBody").innerHTML = sceneHTML(step);
    nav.style.display = ""; $("#tourPrev").style.display = "none"; $("#tourNext").textContent = step.next || "下一步";
  } else if(step.county){
    $("#tourStep").style.display = ""; $("#tourStep").textContent = i + " / " + (TOUR.length-1);
    $("#tourTitle").style.display = ""; $("#tourTitle").textContent = step.title;
    citySel = new Set();
    $("#tourBody").innerHTML = countyHTML();
    nav.style.display = "none";
    wireCountyStep();
  } else if(step.address){
    $("#tourStep").style.display = ""; $("#tourStep").textContent = i + " / " + (TOUR.length-1);
    $("#tourTitle").style.display = ""; $("#tourTitle").textContent = step.title;
    $("#tourBody").innerHTML = addressHTML();
    nav.style.display = "none";
    wireAddressStep();
  } else {
    $("#tourStep").style.display = ""; $("#tourStep").textContent = i + " / " + (TOUR.length-1);
    $("#tourTitle").style.display = ""; $("#tourTitle").textContent = step.title;
    $("#tourBody").textContent = step.body;
    nav.style.display = ""; $("#tourPrev").style.display = i===0 ? "none" : ""; $("#tourNext").textContent = step.next || "下一步";
  }
  requestAnimationFrame(function(){ requestAnimationFrame(function(){ positionTour(step); }); });
}
function positionTour(step){
  const ring = $("#tourRing"), card = $("#tourCard");
  const el = step.target ? document.querySelector(step.target) : null;
  if(el){
    ring.classList.remove("notarget");
    el.scrollIntoView({block: step.align || "center"});
    requestAnimationFrame(function(){
      const r = el.getBoundingClientRect(), pad = 8;
      ring.style.top = (r.top-pad)+"px";
      ring.style.left = (r.left-pad)+"px";
      ring.style.width = (r.width+pad*2)+"px";
      ring.style.height = (r.height+pad*2)+"px";
      card.style.transform = "none";
      if((r.top + r.height/2) < window.innerHeight*0.5){
        // 目標在上半 → 卡片釘在底部（避開 tabbar 與安全區）
        card.style.top = "auto";
        card.style.bottom = "calc(env(safe-area-inset-bottom,0px) + 80px)";
        card.style.maxHeight = Math.max(160, window.innerHeight - r.bottom - 132)+"px";
      } else {
        // 目標在下半 → 卡片釘在頂部（避開瀏海安全區）
        card.style.bottom = "auto";
        card.style.top = "calc(env(safe-area-inset-top,0px) + 12px)";
        card.style.maxHeight = Math.max(160, r.top - 80)+"px";
      }
    });
  } else {
    ring.classList.add("notarget");
    ring.style.top="-60px"; ring.style.left="-60px"; ring.style.width="0px"; ring.style.height="0px";
    card.style.bottom="auto";
    if(step.address || step.county){ card.style.top="14px"; card.style.transform="none"; card.style.maxHeight="82vh"; }
    else { card.style.top="50%"; card.style.transform="translateY(-50%)"; card.style.maxHeight="74vh"; }
  }
}

/* ---------- 啟動 ---------- */
// 首次安裝不預先帶入店家；改由新手教學的「選縣市」步驟匯入（見 TOUR 的 county 步驟）
applyTheme();
clearFilters();
renderHome();
renderStores();
renderSettings();
if(!state.settings.onboarded){ setTimeout(startTour, 450); }
</script>
